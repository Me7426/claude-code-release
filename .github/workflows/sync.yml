name: Sync Claude Code Release

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: claude-code-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      BASE_URL: https://downloads.claude.ai/claude-code-releases

    steps:
      - name: Get latest version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(curl -fsSL "$BASE_URL/latest")

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
            echo "Invalid version returned: $VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists."
          fi

      - name: Download manifest
        if: steps.release.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"

          curl -fsSL \
            "$BASE_URL/$VERSION/manifest.json" \
            -o manifest.json

      - name: Download, verify and package
        if: steps.release.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p dist work

          : > dist/SHA256SUMS
          : > release-notes.md

          {
            echo "Automated sync from the official Claude Code download server."
            echo
            echo "Version: $VERSION"
            echo "Commit: $(jq -r '.commit' manifest.json)"
            echo "Build Date: $(jq -r '.buildDate' manifest.json)"
            echo
            echo "Platforms:"
          } > release-notes.md

          jq -c '.platforms | to_entries[]' manifest.json | while read -r ENTRY; do
            PLATFORM=$(jq -r '.key' <<<"$ENTRY")
            BINARY=$(jq -r '.value.binary' <<<"$ENTRY")
            EXPECTED_SHA=$(jq -r '.value.checksum' <<<"$ENTRY")
            EXPECTED_SIZE=$(jq -r '.value.size' <<<"$ENTRY")

            echo "- $PLATFORM" >> release-notes.md

            mkdir -p "work/$PLATFORM"

            curl -fsSL \
              "$BASE_URL/$VERSION/$PLATFORM/$BINARY" \
              -o "work/$PLATFORM/$BINARY"

            if [[ "$BINARY" != *.exe ]]; then
              chmod +x "work/$PLATFORM/$BINARY"
            fi

            ACTUAL_SIZE=$(stat -c%s "work/$PLATFORM/$BINARY")
            if [[ "$ACTUAL_SIZE" != "$EXPECTED_SIZE" ]]; then
              echo "Size mismatch for $PLATFORM"
              exit 1
            fi

            ACTUAL_SHA=$(sha256sum "work/$PLATFORM/$BINARY" | cut -d' ' -f1)
            if [[ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]]; then
              echo "Checksum mismatch for $PLATFORM"
              exit 1
            fi

            (
              cd "work/$PLATFORM"
              sha256sum "$BINARY" > SHA256SUMS

              if [[ "$BINARY" == *.exe ]]; then
                zip -q "../../dist/claude-$PLATFORM.zip" "$BINARY" SHA256SUMS
              else
                tar -czf "../../dist/claude-$PLATFORM.tar.gz" "$BINARY" SHA256SUMS
              fi
            )

            (
              cd dist
              if [[ -f "claude-$PLATFORM.zip" ]]; then
                sha256sum "claude-$PLATFORM.zip" >> SHA256SUMS
              else
                sha256sum "claude-$PLATFORM.tar.gz" >> SHA256SUMS
              fi
            )

            rm -rf "work/$PLATFORM"
          done

      - name: Create GitHub Release
        if: steps.release.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Claude Code v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          generate_release_notes: false
          files: |
            dist/*
            manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
